services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kcal_counter
      POSTGRES_USER: kcal_counter_user
      POSTGRES_PASSWORD: kcal_counter_password
    ports:
      - "5432:5432"
    volumes:
      - kcal_counter_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcal_counter_user -d kcal_counter"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kcal_counter_data:
