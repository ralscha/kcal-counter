app:
  env: development
  log_level: debug

http:
  address: ":8080"
  read_timeout: 15s
  read_header_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 20s

database:
  url: postgres://kcal_counter_user:kcal_counter_password@localhost:5432/kcal_counter?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 2m

session:
  cookie_name: kcal_counter_session
  lifetime: 24h
  idle_timeout: 12h
  same_site: lax
  secure: false
  http_only: true
  persist: true

security:
  authorization_cache_ttl: 5s
  failed_login_threshold: 5
  failed_login_window: 15m
  inactivity_disable_after: 8760h

webauthn:
  rp_id: localhost
  rp_display_name: Kcal Counter
  rp_origins:
    - http://localhost:4200
    - http://localhost:3000
    - http://localhost:8080

scheduler:
  enabled: true
  cleanup_every: 1h
  inactivity_check_every: 24h