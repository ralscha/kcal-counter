<div class="mx-auto flex min-h-full w-full max-w-4xl flex-col gap-4 p-4 pb-28 md:p-6 md:pb-32">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div class="space-y-1">
      <h1 class="text-2xl font-semibold text-base-content">Lists</h1>
      <p class="text-sm text-base-content/60">
        Reusable food and activity presets for faster tracking.
      </p>
    </div>

    <app-templates-kind-tabs [activeKind]="activeKind()" (selectKind)="setKind($event)" />
  </div>

  @if (showForm()) {
    <app-templates-form
      [activeKind]="activeKind()"
      [editingItem]="editingItem()"
      [form]="form"
      [formError]="formError()"
      [formLoading]="formLoading()"
      (cancelRequested)="cancelForm()"
      (saveRequested)="save()"
    />
  }

  @if (!showForm()) {
    <app-templates-list
      [items]="items()"
      [activeKind]="activeKind()"
      (openEdit)="openEdit($event)"
      (requestDelete)="requestDelete($event)"
      (openAdd)="openAdd()"
    />
  }

  @if (pendingDeleteItem(); as item) {
    <app-templates-delete-modal
      [item]="item"
      (cancelRequested)="cancelDelete()"
      (confirmRequested)="confirmDelete()"
    />
  }
</div>
