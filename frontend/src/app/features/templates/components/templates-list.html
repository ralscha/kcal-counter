<section class="card border border-base-300 bg-base-100 shadow-sm">
  @if (items().length === 0) {
    <div
      class="flex min-h-64 items-center justify-center px-6 py-12 text-center text-sm text-base-content/45"
    >
      No {{ activeKind() }} list items yet.
    </div>
  } @else {
    <div class="max-h-[min(58vh,32rem)] overflow-y-auto">
      <ul class="divide-y divide-base-300">
        @for (item of items(); track item.id) {
          <li class="flex items-center gap-3 px-4 py-3">
            <button
              type="button"
              class="min-w-0 flex-1 rounded-lg p-1 text-left transition-colors hover:bg-base-200/70 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
              [attr.aria-label]="'Edit ' + item.name"
              (click)="openEdit.emit(item)"
            >
              <p class="truncate text-sm font-medium text-base-content">{{ item.name }}</p>
              <p class="text-xs text-base-content/55">
                {{ item.amount }} {{ item.unit }} · {{ item.kcal_amount }} kcal
              </p>
            </button>

            <div class="flex items-center gap-1">
              <button
                type="button"
                class="btn btn-ghost btn-md btn-square"
                [attr.aria-label]="'Edit ' + item.name"
                [title]="'Edit ' + item.name"
                (click)="openEdit.emit(item)"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2.5"
                    d="M16.862 4.487a2.25 2.25 0 013.182 3.182L8.25 19.462 4 20l.538-4.25L16.862 4.487z"
                  />
                </svg>
              </button>

              <button
                type="button"
                class="btn btn-ghost btn-md btn-square text-error"
                [attr.aria-label]="'Delete ' + item.name"
                [title]="'Delete ' + item.name"
                (click)="requestDelete.emit(item)"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  />
                </svg>
              </button>
            </div>
          </li>
        }
      </ul>
    </div>
  }
</section>

<div class="fixed bottom-6 right-6 z-10 md:bottom-8 md:right-8">
  <button
    type="button"
    class="btn btn-primary btn-circle btn-lg shadow-lg"
    aria-label="Add list item"
    title="Add list item"
    (click)="openAdd.emit()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-6 w-6"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
  </button>
</div>
