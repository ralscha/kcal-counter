<section class="rounded-xl border border-base-300 bg-base-100 shadow-sm">
  <div class="max-h-[min(52vh,30rem)] overflow-y-auto">
    <ul class="divide-y divide-base-300">
      @for (entry of entries(); track entry.id) {
        <li class="flex items-center gap-3 px-4 py-3">
          <button
            type="button"
            class="min-w-0 flex-1 rounded-lg p-1 text-left transition-colors hover:bg-base-200/70 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
            aria-label="Edit entry at {{ formatTime(entry.happened_at) }}"
            (click)="openEdit.emit(entry)"
          >
            <p class="text-sm font-medium text-base-content">{{ formatTime(entry.happened_at) }}</p>
            <p
              class="text-xs font-semibold tabular-nums"
              [class.text-success]="entry.kcal_delta > 0"
              [class.text-warning]="entry.kcal_delta < 0"
            >
              {{ entry.kcal_delta > 0 ? '+' : '' }}{{ entry.kcal_delta }} kcal
            </p>
          </button>

          <div class="flex items-center gap-1">
            <button
              type="button"
              class="btn btn-ghost btn-md btn-square"
              aria-label="Edit entry"
              (click)="openEdit.emit(entry)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2.5"
                  d="M16.862 4.487a2.25 2.25 0 013.182 3.182L8.25 19.462 4 20l.538-4.25L16.862 4.487z"
                />
              </svg>
            </button>

            <button
              type="button"
              class="btn btn-ghost btn-md btn-square text-error"
              aria-label="Delete entry"
              (click)="requestDelete.emit(entry)"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
            </button>
          </div>
        </li>
      }
    </ul>
  </div>
</section>
