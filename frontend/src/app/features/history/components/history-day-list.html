<ul class="divide-y divide-base-300 rounded-box border border-base-300 bg-base-100">
  @for (day of days(); track day.dateKey) {
    <li class="px-4 py-3">
      <button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl text-left transition-colors hover:bg-base-200/70 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
        aria-label="Show entries for {{ day.dateLabel }}"
        (click)="openDay.emit(day.dateKey)"
      >
        <div class="min-w-10 text-xs font-semibold uppercase tracking-[0.2em] text-base-content/45">
          {{ day.weekdayLabel }}
        </div>

        <div class="min-w-0 flex-1">
          <div class="font-medium text-base-content">{{ day.dateLabel }}</div>
          <div class="text-xs text-base-content/50">
            {{ day.entries.length }} {{ day.entries.length === 1 ? 'entry' : 'entries' }}
          </div>
        </div>

        <div
          class="text-right text-sm font-semibold tabular-nums"
          [class.text-success]="day.total > 0"
          [class.text-warning]="day.total < 0"
        >
          {{ day.total > 0 ? '+' : '' }}{{ day.total }} kcal
        </div>

        <span class="flex h-8 w-8 items-center justify-center text-base-content/70">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </span>
      </button>
    </li>
  }
</ul>
