<div
  class="modal modal-open"
  role="dialog"
  aria-modal="true"
  aria-labelledby="dashboard-template-picker-title"
>
  <div class="modal-box max-w-lg">
    <div class="mb-4">
      <h2 id="dashboard-template-picker-title" class="text-lg font-semibold">
        {{ title() }}
      </h2>
      <p class="mt-1 text-sm opacity-70">
        Start with Manual Entry or pick a template to prefill the kcal amount.
      </p>
    </div>

    <label class="input input-sm mb-3 flex w-full items-center gap-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4 opacity-60"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
        />
      </svg>
      <input
        type="text"
        class="grow"
        [value]="searchQuery()"
        (input)="searchQueryChanged.emit($event)"
      />
    </label>

    <div class="flex max-h-[min(26rem,calc(100dvh-12rem))] flex-col gap-2 overflow-y-auto pr-1">
      <button
        type="button"
        class="flex w-full items-start justify-between gap-3 rounded-box border border-base-300 px-4 py-3 text-left transition-colors hover:border-primary/40 hover:bg-base-200"
        (click)="manualEntryRequested.emit()"
      >
        <span class="min-w-0 flex-1">
          <span class="block font-medium">Manual Entry</span>
          <span class="mt-1 block text-sm opacity-70">Start from a blank entry form.</span>
        </span>
      </button>

      @if (templates().length === 0) {
        <div class="rounded-box bg-base-200 px-4 py-5 text-sm opacity-70">
          No templates match your search.
        </div>
      } @else {
        @for (template of templates(); track template.id) {
          <button
            type="button"
            class="flex w-full items-start justify-between gap-3 rounded-box border border-base-300 px-4 py-3 text-left transition-colors hover:border-primary/40 hover:bg-base-200"
            (click)="templateSelected.emit(template)"
          >
            <span class="min-w-0 flex-1">
              <span class="block font-medium">{{ template.name }}</span>
              <span class="mt-1 block text-sm opacity-70">
                {{ template.kcal_amount }} kcal / {{ template.amount }} {{ template.unit }}
              </span>
            </span>
          </button>
        }
      }
    </div>

    <div class="modal-action mt-4">
      <button type="button" class="btn btn-ghost btn-sm" (click)="backRequested.emit()">
        Back
      </button>
    </div>
  </div>
  <button
    type="button"
    class="modal-backdrop"
    aria-label="Close template picker"
    (click)="cancelRequested.emit()"
  ></button>
</div>
