<div class="mx-auto max-w-4xl p-4 md:p-6">
  <h1 class="mb-6 text-2xl font-bold text-base-content">Profile</h1>

  <div class="card border border-base-300 bg-base-100">
    <div class="card-body gap-5">
      <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4">
        <div class="flex items-center justify-between gap-3 rounded-xl bg-base-200 px-4 py-3">
          <div>
            <p class="text-sm font-medium text-base-content">Theme</p>
            <p class="text-xs text-base-content/60">Switch between light and dark.</p>
          </div>
          <app-theme-toggle />
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-base-content" for="profile-kcal-limit">
            Daily kcal limit
          </label>
          <app-custom-keypad-input
            inputId="profile-kcal-limit"
            formControlName="kcalLimit"
            [keypadRows]="integerKeypadRows"
            [inputConstraint]="'integer'"
            [describedBy]="'profile-kcal-limit-help'"
            [invalid]="!!(form.controls.kcalLimit.invalid && form.controls.kcalLimit.touched)"
            [inputClass]="
              'input input-bordered w-full' +
              (form.controls.kcalLimit.invalid && form.controls.kcalLimit.touched
                ? ' input-error'
                : '')
            "
            placeholder="2200"
            ariaLabel="Daily kcal limit"
          />
          <span class="text-xs text-base-content/60">
            Leave blank if you do not want a local target.
          </span>
          @if (form.controls.kcalLimit.touched && form.controls.kcalLimit.hasError('min')) {
            <span id="profile-kcal-limit-help" class="text-xs text-error"
              >Enter a value above 0.</span
            >
          } @else {
            <span id="profile-kcal-limit-help" class="text-xs text-base-content/60">
              Use the keypad for whole-number limits.
            </span>
          }
        </div>

        <label class="flex flex-col gap-2">
          <span class="text-sm font-medium text-base-content">Cycle start date</span>
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
            <input
              type="date"
              class="input input-bordered w-full sm:max-w-xs"
              formControlName="cycleStartDate"
            />
            <button
              type="button"
              class="btn btn-outline btn-sm sm:shrink-0"
              (click)="startNewCycle()"
            >
              Start new cycle
            </button>
          </div>
        </label>

        <div
          class="flex flex-col gap-3 border-t border-base-300 pt-4 sm:flex-row sm:items-center sm:justify-end"
        >
          <button
            type="submit"
            class="btn btn-primary btn-sm"
            [disabled]="form.invalid || saveState() === 'saving' || !preferencesService.loaded()"
          >
            @if (saveState() === 'saving') {
              Saving...
            } @else {
              Save preferences
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
