<div class="card bg-base-100 shadow-xl">
  <div class="card-body gap-5 p-5 sm:p-6">
    <div class="space-y-2 text-center">
      <h2 class="card-title justify-center text-xl">Create your passkey account</h2>
      <p class="text-sm text-base-content/70">Create an account with a passkey on this device.</p>
    </div>

    @if (error()) {
      <div class="alert alert-error py-2 text-sm">{{ error() }}</div>
    }

    <form (submit)="$event.preventDefault(); submit()" class="flex flex-col gap-3">
      <button type="submit" class="btn btn-primary w-full gap-2" [disabled]="loading()">
        @if (loading()) {
          <span class="loading loading-spinner loading-sm"></span>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
            />
          </svg>
        }
        Create account with passkey
      </button>
    </form>

    <p class="text-center text-sm text-base-content/60">
      Already registered?
      <a routerLink="/auth/login" class="link link-primary inline-block py-1">Sign in</a>
    </p>
  </div>
</div>
